<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#12121a"/>
    </linearGradient>
    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0099cc"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Cyan border glow -->
  <rect width="64" height="64" rx="14" fill="none" stroke="url(#border)" stroke-width="2"/>
  <!-- Letter A -->
  <text x="10" y="46" font-family="Montserrat, Arial, sans-serif" font-weight="800"
        font-size="30" fill="#00d4ff" letter-spacing="-1">A</text>
  <!-- Letter B (slightly offset, lighter) -->
  <text x="33" y="46" font-family="Montserrat, Arial, sans-serif" font-weight="800"
        font-size="30" fill="rgba(0,212,255,0.6)" letter-spacing="-1">B</text>
  <!-- Bottom accent line -->
  <rect x="10" y="50" width="44" height="2" rx="1" fill="url(#border)" opacity="0.6"/>
</svg>
